*{box-sizing:border-box}

body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#f9f5ed 0%,#f4efe5 45%,#faf8f2 100%);color:var(--text);min-height:100vh}

const ORIGINAL_CLIENTS = [{"id": "c1", "name": "وكالة المنصورة", "tax": "313450196"}, {"id": "c2", "name": "بندة", "tax": "479918899"}, {"id": "c3", "name": "اوسكار", "tax": "200139495"}, {"id": "c4", "name": "جيان ماركت   رع", "tax": "679752358"}, {"id": "c5", "name": "سبينيس", "tax": "215533240"}, {"id": "c6", "name": "اللولو", "tax": "447599798"}, {"id": "c7", "name": "سوان ماركت", "tax": "718794168"}, {"id": "c8", "name": "بيم", "tax": "413344312"}, {"id": "c9", "name": "جمعية الحصرى", "tax": "266853943"}, {"id": "c10", "name": "الفار", "tax": "100535607"}, {"id": "c11", "name": "فندق هيلتون هليوبلس", "tax": "100356672"}, {"id": "c12", "name": "جودز مارت", "tax": "535966474"}, {"id": "c13", "name": "فندق سانت ريجيس العاصمة", "tax": "655468048"}, {"id": "c14", "name": "اوكازيون", "tax": "474218643"}, {"id": "c15", "name": "فندق ماريوت مينا هاوس", "tax": "735475547"}, {"id": "c16", "name": "نون", "tax": "730555992"}, {"id": "c17", "name": "لوما", "tax": "416130453"}, {"id": "c18", "name": "برينجو", "tax": "100497780"}, {"id": "c19", "name": "بان كيكس فودز", "tax": "635919516"}, {"id": "c20", "name": "فندق سانت ريجيس كورنيش النيل", "tax": "239892747"}, {"id": "c21", "name": "سوبر سنتر", "tax": "757864252"}, {"id": "c22", "name": "زهران", "tax": "415831687"}, {"id": "c23", "name": "فندق رايدسون بلو شيراتون", "tax": "274328453"}, {"id": "c24", "name": "كارفور", "tax": "200185128"}, {"id": "c25", "name": "اولاد رجب", "tax": "244946868"}, {"id": "c26", "name": "امازون", "tax": "340035072"}, {"id": "c27", "name": "هايبر رومين", "tax": "723799210"}];
const sectionOrder = ['بيج ايج','كارفور','فاليو','أخرى'];
const colorOrder = ['أبيض','أحمر','بلدي','غير محدد'];
let page='products';
let activeProductFilter='الكل';
let products = load('oval_products_v6', ORIGINAL_PRODUCTS);
let clients = load('oval_clients_v6', ORIGINAL_CLIENTS);
const content=document.getElementById('content'), statsEl=document.getElementById('stats');

function load(key, fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):structuredClone(fallback)}catch(e){return structuredClone(fallback)}}
function persist(){localStorage.setItem('oval_products_v6',JSON.stringify(products));localStorage.setItem('oval_clients_v6',JSON.stringify(clients));}
function resetData(){products=structuredClone(ORIGINAL_PRODUCTS);clients=structuredClone(ORIGINAL_CLIENTS);persist();render();toast('تم استرجاع البيانات الأصلية')}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function norm(s){return String(s??'').toLowerCase().replace(/أ|إ|آ/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').trim();}
function sectionOf(p){const n=norm((p.name||'')+' '+(p.brand||'')); if(n.includes('كارفور')) return 'كارفور'; if(n.includes('فاليو')) return 'فاليو'; if(n.includes('بيج')||n.includes('big')) return 'بيج ايج'; return p.brand==='بيج ايج'||p.brand==='فاليو'||p.brand==='كارفور'?p.brand:'أخرى';}
function colorOf(p){const n=norm((p.color||'')+' '+(p.name||'')); if(n.includes('احمر')) return 'أحمر'; if(n.includes('بلدي')||n.includes('بلدى')) return 'بلدي'; if(n.includes('ابيض')) return 'أبيض'; return 'غير محدد';}
function matchItem(x,q){q=norm(q); if(!q) return true; return norm(Object.values(x).join(' ')).includes(q);}
function setPage(p){page=p;productsTab.classList.toggle('active',p==='products');taxTab.classList.toggle('active',p==='tax');productFilters.style.display=p==='products'?'flex':'none';search.value='';render();}
function setProductFilter(f){activeProductFilter=f;document.querySelectorAll('#productFilters button').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));render();}
function stats(list){if(page==='products'){let c={'بيج ايج':0,'كارفور':0,'فاليو':0,'أخرى':0};list.forEach(x=>c[sectionOf(x)]++);statsEl.innerHTML=`<span class="pill">الإجمالي: <b>${list.length}</b></span><span class="pill">بيج ايج: <b>${c['بيج ايج']}</b></span><span class="pill">كارفور: <b>${c['كارفور']}</b></span><span class="pill">فاليو: <b>${c['فاليو']}</b></span><span class="pill">أخرى: <b>${c['أخرى']}</b></span>`;}else{statsEl.innerHTML=`<span class="pill">عدد الشركات: <b>${list.length}</b></span>`;}}
function cardClass(p){const c=colorOf(p);return c==='أحمر'?'egg-red':c==='بلدي'?'egg-balady':c==='أبيض'?'egg-white':'egg-other';}
function rowProduct(p,i){return `<article class="product-card ${cardClass(p)}"><div class="product-card-top"><span class="product-index">${i+1}</span><span class="product-type">${esc(colorOf(p))}</span></div><div class="product-name">${esc(p.name)}</div><div class="product-barcode">${esc(p.barcode)}</div><div class="actions"><button onclick='copyText(${JSON.stringify(p.barcode)})'>نسخ</button><button class="blue" onclick='openEdit("product",${JSON.stringify(p.id)})'>تعديل</button></div></article>`;}
function colorClass(c){return c==='أحمر'?'red':c==='بلدي'?'balady':c==='غير محدد'?'other':'';}
function colorBlockHtml(color,items){return `<div class="color-block"><div class="color-head"><div class="color-title"><span class="dot ${colorClass(color)}"></span>${color}</div><small>${items.length} صنف</small></div><div class="products-grid">${items.map(rowProduct).join('')}</div></div>`;}
function sectionHtml(name,items){let body=''; if(name==='بيج ايج'){colorOrder.forEach(c=>{const part=items.filter(x=>colorOf(x)===c); if(part.length) body+=colorBlockHtml(c,part);});} else {const grouped={}; items.forEach(x=>{const c=colorOf(x); (grouped[c]??=[]).push(x);}); colorOrder.forEach(c=>{if(grouped[c]?.length) body+=colorBlockHtml(c,grouped[c]);});} return `<section class="brand-section"><div class="brand-head"><h2>${name}</h2><small>${items.length} صنف</small></div>${body}</section>`;}
function rowTax(c){return `<div class="tax-row"><div class="tax-name">${esc(c.name)}</div><div class="tax-code">${esc(c.tax)}</div><div class="actions"><button onclick='copyText(${JSON.stringify(c.tax)})'>نسخ</button><button class="blue" onclick='openEdit("tax",${JSON.stringify(c.id)})'>تعديل</button></div></div>`;}
function render(){productFilters.style.display=page==='products'?'flex':'none';const q=search.value; if(page==='products'){let list=products.filter(x=>matchItem(x,q)).filter(x=>activeProductFilter==='الكل'||sectionOf(x)===activeProductFilter).sort((a,b)=>sectionOrder.indexOf(sectionOf(a))-sectionOrder.indexOf(sectionOf(b)) || colorOrder.indexOf(colorOf(a))-colorOrder.indexOf(colorOf(b)) || (a.serial||0)-(b.serial||0)); stats(list); let html='<div class="product-view">'; sectionOrder.forEach(sec=>{const part=list.filter(x=>sectionOf(x)===sec); if(part.length) html+=sectionHtml(sec,part);}); html+='</div>'; content.innerHTML=list.length?html:'<div class="empty">مفيش بيانات مطابقة للبحث</div>';} else {let list=clients.filter(x=>matchItem(x,q)); stats(list); content.innerHTML=list.length?`<section class="tax-list">${list.map(rowTax).join('')}</section>`:'<div class="empty">مفيش بيانات مطابقة للبحث</div>';}}
function copyText(t){navigator.clipboard?.writeText(t).then(()=>toast('تم النسخ')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('تم النسخ');});}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600);}
function openAdd(){openEdit(page==='products'?'product':'tax',null);}
function openEdit(type,id){editType.value=type;editId.value=id||'';productFields.style.display=type==='product'?'block':'none';taxFields.style.display=type==='tax'?'block':'none';modalTitle.textContent=id?'تعديل':'إضافة'; if(type==='product'){const p=products.find(x=>x.id===id)||{name:'',barcode:'',brand:'بيج ايج',color:''};editName.value=p.name||'';editCode.value=p.barcode||'';editBrand.value=sectionOf(p)||'بيج ايج';}else{const c=clients.find(x=>x.id===id)||{name:'',tax:''};editClient.value=c.name||'';editTax.value=c.tax||'';} editor.showModal();}
function saveEdit(ev){ev.preventDefault();const type=editType.value,id=editId.value;if(type==='product'){if(id){const p=products.find(x=>x.id===id); if(p) Object.assign(p,{name:editName.value.trim(),barcode:editCode.value.trim(),brand:editBrand.value,color:colorOf({name:editName.value,color:''})});}else{products.push({id:'p'+Date.now(),serial:products.length+1,name:editName.value.trim(),barcode:editCode.value.trim(),brand:editBrand.value,color:colorOf({name:editName.value,color:''})});}}else{if(id){const c=clients.find(x=>x.id===id); if(c) Object.assign(c,{name:editClient.value.trim(),tax:editTax.value.trim()});}else{clients.push({id:'c'+Date.now(),name:editClient.value.trim(),tax:editTax.value.trim()});}} persist();editor.close();render();toast('تم الحفظ');}
function deleteCurrent(){const type=editType.value,id=editId.value;if(!id){editor.close();return} if(!confirm('متأكد من الحذف؟')) return; if(type==='product') products=products.filter(x=>x.id!==id); else clients=clients.filter(x=>x.id!==id); persist();editor.close();render();toast('تم الحذف');}
render();
</script>
