<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OVAL - أكواد الأصناف | ألوان هادية</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <section class="header">
      <div>
        <h1>OVAL | أكواد الأصناف والأرقام الضريبية</h1>
        <p class="subtitle">فلتر بنقرة واحدة حسب البراند، مع شكل هادي وسادة مناسب للشغل اليومي.</p>
      </div>
      <div class="tabs">
        <button id="productsTab" class="active" onclick="setPage('products')">باركود الأصناف</button>
        <button id="taxTab" onclick="setPage('tax')">الأرقام الضريبية</button>
        <button id="themeToggle" class="theme-toggle" onclick="toggleDarkMode()">🌙</button>
      </div>
    </section>

    <section class="toolbar">
      <input id="search" class="search" placeholder="ابحث بالاسم أو الباركود أو الرقم الضريبي..." oninput="render()">
      <button class="orange" onclick="openAdd()">+ إضافة</button>
      <button onclick="resetData()">استرجاع الأصل</button>
      <button onclick="window.print()">طباعة</button>
    </section>

    <section id="productFilters" class="filter-bar">
      <button data-filter="الكل" class="active" onclick="setProductFilter('الكل')">الكل</button>
      <button data-filter="بيج ايج" onclick="setProductFilter('بيج ايج')">بيج ايج</button>
      <button data-filter="كارفور" onclick="setProductFilter('كارفور')">كارفور</button>
      <button data-filter="فاليو" onclick="setProductFilter('فاليو')">فاليو</button>
      <button data-filter="أخرى" onclick="setProductFilter('أخرى')">أخرى</button>
    </section>

    <section id="stats" class="stats"></section>
    <main id="content"></main>
  </div>

  <div id="toast" class="toast"></div>

  <dialog id="editor">
    <form class="modal" onsubmit="saveEdit(event)">
      <h3 id="modalTitle">تعديل</h3>
      <input type="hidden" id="editType">
      <input type="hidden" id="editId">

      <div id="productFields">
        <div class="field">
          <label>اسم الصنف</label>
          <textarea id="editName"></textarea>
        </div>
        <div class="field">
          <label>الباركود</label>
          <input id="editCode" dir="ltr">
        </div>
        <div class="field">
          <label>المجموعة</label>
          <select id="editBrand">
            <option>بيج ايج</option>
            <option>كارفور</option>
            <option>فاليو</option>
            <option>أخرى</option>
          </select>
        </div>
      </div>

      <div id="taxFields">
        <div class="field">
          <label>اسم الشركة</label>
          <input id="editClient">
        </div>
        <div class="field">
          <label>الرقم الضريبي</label>
          <input id="editTax" dir="ltr">
        </div>
      </div>

      <div class="modal-actions">
        <button type="submit">حفظ</button>
        <button type="button" onclick="document.getElementById('editor').close()">إلغاء</button>
        <button type="button" class="danger" onclick="deleteCurrent()">حذف</button>
      </div>
    </form>
  </dialog>

  <!-- SCRIPTS -->
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
